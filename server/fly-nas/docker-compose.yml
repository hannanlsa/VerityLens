# VerityLens 服务端部署（飞牛 NAS · v0.6.0）
#
# 精简版：2 服务（FastAPI + Ollama）
# 浏览器插件为主力形态，Docker 为可选本地推理通道
# 决策：冷门端口 49152-65535（IANA 动态端口范围）
# 与 WhisperArchive 端口错开：WhisperArchive 在 51000-65000，VerityLens 在 52000-63000
# 冷门端口分配（2 服务 2 端口）
# 61593  - API (FastAPI 主入口，OpenAI 兼容接口)
# 63257  - Ollama (LLM 推理)

version: '3.8'

services:
  verity-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verity-lens-api
    restart: unless-stopped
    environment:
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:7b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - verity_data:/data
      - verity_logs:/var/log/verity-lens
    ports:
      - "61593:8000"
    depends_on:
      ollama:
        condition: service_started
    networks:
      - verity-net

  ollama:
    image: ollama/ollama:latest
    container_name: verity-lens-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "63257:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - verity-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  verity_data:
    driver: local
  verity_logs:
    driver: local
  ollama_data:
    driver: local

networks:
  verity-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
