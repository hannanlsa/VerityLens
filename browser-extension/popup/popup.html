<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VerityLens</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🛡️ VerityLens</h1>
      <p class="subtitle">真实透镜 · 反虚假信息助手</p>
    </header>

    <section class="status">
      <div class="status-row">
        <span class="label">通道</span>
        <span id="channelMode" class="value">智能切换</span>
      </div>
      <div class="status-row">
        <span class="label">模型</span>
        <span id="currentModel" class="value">本地</span>
      </div>
      <div class="status-row">
        <span class="label">置信度阈值</span>
        <input type="range" id="threshold" min="0" max="100" value="65">
        <span id="threshold-value">65%</span>
      </div>
    </section>

    <section class="stats">
      <h2>本次会话</h2>
      <div class="stat-grid">
        <div class="stat-item">
          <span class="stat-num" id="verified-count">0</span>
          <span class="stat-label">已验证</span>
        </div>
        <div class="stat-item green">
          <span class="stat-num" id="high-count">0</span>
          <span class="stat-label">高置信</span>
        </div>
        <div class="stat-item red">
          <span class="stat-num" id="low-count">0</span>
          <span class="stat-label">低置信</span>
        </div>
      </div>
    </section>

    <footer>
      <button id="settings">⚙️ 设置</button>
      <button id="translate">🌐 翻译</button>
      <button id="debug">🐛 调试</button>
      <button id="about">ℹ️ 关于</button>
    </footer>
  </div>
  <script src="../common/verity-core.js"></script>
  <script src="popup.js"></script>
</body>
</html>
